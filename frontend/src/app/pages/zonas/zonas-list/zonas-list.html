<section class="page-header">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a routerLink="/">Inicio</a> &gt; <span>Zonas de Servicio</span>
    </nav>
    <h1>Zonas de Servicio de Plomería en Bogotá</h1>
    <p>Cobertura profesional de plomería en todas las localidades de Bogotá.</p>
  </div>
</section>

<section class="zonas-list">
  <div class="container">
    <div class="zonas-list__grid">
      @for (zona of zonas; track zona.slug) {
        <a [routerLink]="['/zonas', zona.slug]" class="zona-card">
          <span class="zona-card__icon">📍</span>
          <h2>Plomero en {{ zona.nombre }}</h2>
          <p>{{ zona.contenido[0] }}</p>
          <span class="zona-card__link">Ver cobertura →</span>
        </a>
      }
    </div>
  </div>
</section>
