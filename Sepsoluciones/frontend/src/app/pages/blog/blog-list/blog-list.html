<section class="page-header">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a routerLink="/">Inicio</a> &gt; <span>Blog</span>
    </nav>
    <h1>Blog de Plomería</h1>
    <p>Consejos, guías y tips profesionales para el cuidado de las tuberías de su hogar.</p>
  </div>
</section>

<section class="blog-list">
  <div class="container">
    <div class="blog-list__grid">
      @for (post of posts; track post.slug) {
        <a [routerLink]="['/blog', post.slug]" class="blog-card">
          <span class="blog-card__fecha">{{ post.fecha }}</span>
          <h2>{{ post.titulo }}</h2>
          <p>{{ post.extracto }}</p>
          <span class="blog-card__link">Leer más →</span>
        </a>
      }
    </div>
  </div>
</section>
